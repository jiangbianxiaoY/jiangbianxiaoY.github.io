info:
  title: "XiaoY'Blog"
  subtitle: ''
  author: 江边小余
  url: https://jiangbianxiaoy.github.io

defaults:
  favicon: /images/blog_icon.svg
  logo:
  avatar: /images/head.jpg

colors:
  primary: "#A31F34"
  secondary:
  default_mode: light

global:
  fonts:
    chinese:
      enable: true
      family: Noto Sans SC
      url: https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap
    english:
      enable: true
      family: Farsan
      url:
    title:
      enable: false
      family:
      url:
  content_max_width: 1000px
  sidebar_width: 210px
  hover:
    shadow: true
    scale: true
  scroll_progress:
    bar: true
    percentage: true
  website_counter:
    url: https://cn.vercount.one/js
    enable: true
    site_pv: true
    site_uv: true
    post_pv: true
  single_page: true
  preloader:
    enable: true
    custom_message:
  side_tools:
    gear_rotation: true
    auto_expand: false
  open_graph:
    enable: true
    image: /images/redefine-og.webp
    description: Hexo Theme Redefine, Redefine Your Hexo Journey.
  google_analytics:
    enable: false
    id:

fontawesome:
  thin: true
  light: true
  duotone: true
  sharp_solid: true

home_banner:
  enable: true
  style: fixed
  image:
    light: /images/homepage.jpeg
    dark: /images/homepage.jpeg
  title: welcome my Blog
  subtitle:
    text: []
    hitokoto:
      enable: false
      show_author: false
      api: https://v1.hitokoto.cn
    typing_speed: 100
    backing_speed: 80
    starting_delay: 500
    backing_delay: 1500
    loop: true
    smart_backspace: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  text_style:
    title_size: 2.8rem
    subtitle_size: 1.5rem
    line_height: 1.2
  custom_font:
    enable: false
    family:
    url:
  social_links:
    enable: false
    style: default
    links:
      github:
      instagram:
      zhihu:
      twitter:
      email:
    qrs:
      weixin:

navbar:
  auto_hide: false
  color:
    left: "#ffffff"
    right: "#ffffff"
    transparency: 35
  width:
    home: 1200px
    pages: 1000px
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    文章:
      path: /archives
      icon: fa-regular fa-archive
    分类:
      icon: fa-solid fa-folder
      path: /categories/
    标签:
      icon: fa-solid fa-tags
      path: /tags/
    相册:
      icon: fa-solid fa-image
      path: /masonry/
    Links:
      icon: fa-regular fa-link
      submenus:
        GitHub: https://github.com
        Gitee: https://gitee.com
        Bilibili: https://bilibili.com
  search:
    enable: true
    preload: true

home:
  sidebar:
    enable: true
    position: left
    first_item: menu
    announcement:
    show_on_mobile: true
    links:
  article_date_format: YYYY-MM-DD HH:mm:ss
  excerpt_length: 200
  categories:
    enable: true
    limit: 3
  tags:
    enable: true
    limit: 3

articles:
  style:
    font_size: 16px
    line_height: 1.5
    image_border_radius: 14px
    image_alignment: center
    image_caption: false
    link_icon: true
    delete_mask: false
    title_alignment: left
    headings_top_spacing:
      h1: 3.2rem
      h2: 2.4rem
      h3: 1.9rem
      h4: 1.6rem
      h5: 1.4rem
      h6: 1.3rem
  word_count:
    enable: true
    count: true
    min2read: true
  author_label:
    enable: true
    auto: false
    list: []
  code_block:
    copy: true
    style: mac
    highlight_theme:
      light: github
      dark: vs2015
    font:
      enable: false
      family:
      url:
  toc:
    enable: true
    max_depth: 3
    number: false
    expand: true
    init_open: true
  copyright:
    enable: false
    default: cc_by_nc_sa
  lazyload: false
  pangu_js: false
  recommendation:
    enable: false
    title: 推荐阅读
    limit: 3
    mobile_limit: 2
    placeholder: /images/wallhaven-wqery6-light.webp
    skip_dirs: []

comment:
  enable: false
  system: giscus
  config:
    waline:
      serverUrl:
      lang: zh-CN
      emoji: []
      recaptchaV3Key:
      turnstileKey:
      reaction: false
    gitalk:
      clientID:
      clientSecret:
      repo:
      owner:
      proxy:
    twikoo:
      version: 1.6.10
      server_url:
      region:
    giscus:
      repo: jiangbianxiaoY/jiangbianxiaoY.github.io
      repo_id: # 请替换为你的 repo_id（见 https://giscus.app）
      category: Announcements
      category_id: # 请替换为你的 category_id
      mapping: pathname
      strict: 0
      reactions_enabled: 1
      emit_metadata: 0
      lang: zh-CN
      input_position: bottom
      loading: lazy

footer:
  runtime: true
  icon: '<i class="fa-solid fa-heart fa-beat" style="--fa-animation-duration: 0.5s; color: #f54545"></i>'
  start: 2025/10/13 23:14:11
  statistics: true
  customize: 你说的对，但是《原神》是由米哈游自主研发的一款全新开放世界冒险游戏。
  icp:
    enable: false
    number:
    url:

inject:
  enable: true
  head:
    - <script>MathJax={tex:{inlineMath:[["$","$"],["\\(","\\)"]]},options:{skipHtmlTypes:"script"}};</script>
    - <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    - <style>.markdown-body > table,.markdown-body .tab-pane > table{border-top:2px solid var(--default-text-color) !important;border-bottom:2px solid var(--default-text-color) !important}.markdown-body > table thead th,.markdown-body .tab-pane > table thead th{border-bottom:2px solid var(--default-text-color) !important}.markdown-body > table td,.markdown-body > table th{border-left:none !important}</style>
  footer:

plugins:
  feed:
    enable: false
  aplayer:
    enable: false
    type: fixed
    audios:
      - name:
        artist:
        url:
        cover:
        lrc:
  mermaid:
    enable: false
    version: "11.4.1"

page_templates:
  friends_column: 2
  tags_style: blur

masonry:
  - image: /images/homepage.jpeg
    title: 示例图片
    description: 这是一张示例图片

cdn:
  enable: false
  provider: npmmirror
  custom_url:

developer:
  enable: false
